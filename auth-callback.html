<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Auth callback</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 24px; color:#222; text-align:center }
      a.button { display:inline-block; padding:12px 20px; background:#4ECDC4; color:#fff; border-radius:8px; text-decoration:none; margin-top:16px }
    </style>
  </head>
  <body>
    <h3>Signing you in…</h3>
    <p>Redirecting back to the app.</p>
    <p id="manual"></p>

    <script>
      (function(){
        // Supabase sends tokens in fragment (#) or code in query (?)
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        // Combine: prefer hash (implicit flow), else query (PKCE code flow)
        var payload = hash || search || '';

        // Build the deep link that the native app listens for.
        // openAuthSessionAsync will detect this custom-scheme navigation and
        // close the Custom Tab, returning the full URL to the app.
        var deepLink = 'myapp://auth/callback' + payload;

        // Attempt 1: direct custom scheme redirect
        // On Android Chrome Custom Tabs, this triggers the registered intent filter
        // and expo-web-browser's returnUrl detection closes the tab.
        window.location.replace(deepLink);

        // Attempt 2 (fallback after 500ms): Android intent URI
        // This is more reliable if the plain scheme redirect doesn't trigger
        setTimeout(function(){
          var intentUri = 'intent://auth/callback' + payload +
            '#Intent;scheme=myapp;package=com.shankar_bojanki.teluguDaily;end';
          window.location.replace(intentUri);
        }, 500);

        // Attempt 3 (fallback after 2s): show manual button
        setTimeout(function(){
          var p = document.getElementById('manual');
          p.innerHTML = '<p style="color:#666">If the app did not open automatically:</p>' +
                        '<a class="button" href="' + deepLink + '">Open Telugu Daily</a>';
        }, 2000);
      })();
    </script>
  </body>
</html>
