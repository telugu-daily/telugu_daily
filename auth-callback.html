<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Auth callback</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 24px; color:#222 }
      a.button { display:inline-block; padding:10px 14px; background:#4ECDC4; color:#fff; border-radius:6px; text-decoration:none }
    </style>
  </head>
  <body>
    <h3>Returning to app…</h3>
    <p>If your app does not open automatically, tap the button below.</p>
    <p id="manual"></p>

    <script>
      (function(){
        // Read fragment (#) or query (?) that contains tokens from Supabase
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        var payload = hash || search || '';

        // Primary deep link used by the native app
        var appLink = 'myapp://auth/callback' + payload;

        // Android intent:// URL — Chrome respects this even in Custom Tabs
        // Package name must match your app's applicationId
        var intentLink = 'intent://auth/callback' + payload +
          '#Intent;scheme=myapp;package=com.shankar_bojanki.teluguDaily;end';

        // Try intent link first (works reliably in Chrome Custom Tabs on Android)
        window.location.replace(intentLink);

        // Fallback: after 1s show manual buttons
        setTimeout(function(){
          var p = document.getElementById('manual');
          p.innerHTML = '<a class="button" href="' + appLink + '">Open Telugu Daily</a>' +
                        '<p style="margin-top:12px;color:#666">If the app doesn\'t open, make sure it is installed and try again.</p>';
        }, 1000);
      })();
    </script>
  </body>
</html>
